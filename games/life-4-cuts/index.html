<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JoonHee's Life 4 Cuts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @font-face {
      font-family: 'HakgyoansimNadeuriTTF-B';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-5@1.0/HakgyoansimNadeuriTTF-B.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'HakgyoansimNadeuriTTF-B', sans-serif;
      margin: 0;
      background: linear-gradient(120deg, #ff9a9e, #fad0c4);
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      background: #fff;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      max-width: 1200px;
      margin: 0 auto;
      justify-content: center;
    }

    .left-panel, .right-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1 1 360px;
      min-width: 300px;
    }

    video {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 3 / 4;
      border-radius: 10px;
      background: #000;
      transform: scaleX(-1); 
    }

    canvas {
      width: auto;
      max-width: min(400px, 100%);
      max-height: calc(100vh - 190px);
      background: #eee;
      border-radius: 10px;
      object-fit: contain;
    }

    .color-picker {
      margin: 15px 0;
      text-align: center;
    }

    .color-option {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-block;
      margin: 5px;
      cursor: pointer;
      border: 2px solid #ccc;
    }

    .color-option.selected {
      border: 3px solid #000;
    }

    .controls {
      margin-top: 10px;
    }

    button {
      font-family: inherit;
      font-size: 1rem;
      padding: 10px 20px;
      margin: 5px;
      background-color: #ff79c6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff47b2;
    }

    p {
      font-size: 0.9rem;
      margin: 0.5em 0;
      text-align: center;
    }

    .caption-panel, .retake-controls {
      margin-top: 10px;
      text-align: center;
    }

    .caption-panel input {
      font-family: 'HakgyoansimNadeuriTTF-B', sans-serif;
      width: min(360px, 100%);
      padding: 10px 12px;
      border: 2px solid #ff79c6;
      border-radius: 10px;
      font-size: 1rem;
      text-align: center;
      outline: none;
    }

    .retake-controls button {
      font-size: 0.85rem;
      padding: 8px 12px;
    }

    .shoot-status {
      min-height: 1.2em;
      color: #444;
    }
  </style>
  <link rel="stylesheet" href="../../shared.css" />
</head>
<body class="mygame-soft">
  <nav class="mygame-topnav">
    <a class="mygame-home" href="../../">← my game</a>
    <span class="mygame-date">Created Apr 1, 2025</span>
  </nav>

  <header class="life-header mygame-card">
    <h1>JoonHee's Life 4 Cuts</h1>
    <p>카메라 권한 허용 필수!!</p>
  </header>

  <div class="wrapper">
    <div class="left-panel">
      <video id="video" autoplay playsinline></video>

      <div class="color-picker" id="colors">
        <p>Choose a frame color before taking photos:</p>
        <span class="color-option" style="background:#FFADAD" data-color="#FFADAD"></span>
        <span class="color-option" style="background:#FFD6A5" data-color="#FFD6A5"></span>
        <span class="color-option" style="background:#CAFFBF" data-color="#CAFFBF"></span>
        <span class="color-option" style="background:#9BF6FF" data-color="#9BF6FF"></span>
        <span class="color-option" style="background:#A0C4FF" data-color="#A0C4FF"></span>
        <span class="color-option" style="background:#BDB2FF" data-color="#BDB2FF"></span>
      </div>

      <div class="controls">
        <button onclick="takePhoto()">Take Photo</button>
        <button onclick="downloadPhoto()">Download</button>
      </div>

      <div class="caption-panel" id="captionPanel" hidden>
        <p>네 컷 촬영 후 날짜 아래에 넣을 문구를 입력하세요.</p>
        <input id="captionInput" type="text" maxlength="32" placeholder="예: 오늘도 행복한 하루" />
      </div>
      <p class="shoot-status" id="shootStatus"></p>
    </div>

    <div class="right-panel">
      <canvas id="canvas" width="360"></canvas>
      <div class="retake-controls" id="retakeControls" hidden>
        <button onclick="prepareRetake(0)">1컷 재촬영</button>
        <button onclick="prepareRetake(1)">2컷 재촬영</button>
        <button onclick="prepareRetake(2)">3컷 재촬영</button>
        <button onclick="prepareRetake(3)">4컷 재촬영</button>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const colorOptions = document.querySelectorAll(".color-option");
    const captionPanel = document.getElementById("captionPanel");
    const captionInput = document.getElementById("captionInput");
    const retakeControls = document.getElementById("retakeControls");
    const shootStatus = document.getElementById("shootStatus");

    const titleText = "JoonHee's Life 4 Cuts";
    const maxPhotos = 4;
    const topMargin = 60;
    const sidePadding = 10;
    const bottomMargin = 155;

    let selectedColor = "#FFADAD";
    let photoIndex = 0;
    let retakeIndex = null;
    let frameWidth = canvas.width;
    let frameHeight = 0;
    let currentDate = "";
    let captionText = "";
    const photos = new Array(maxPhotos).fill(null);

    function getCurrentDate() {
      const d = new Date();
      return `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')}`;
    }

    colorOptions.forEach(opt => {
      opt.addEventListener("click", () => {
        colorOptions.forEach(o => o.classList.remove("selected"));
        opt.classList.add("selected");
        selectedColor = opt.dataset.color;
        if (frameHeight > 0) drawFrame();
      });
    });

    captionInput.addEventListener("input", () => {
      captionText = captionInput.value.trim();
      drawFrame();
    });

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;

        video.onloadedmetadata = () => {
          const aspectRatio = video.videoHeight / video.videoWidth;
          frameHeight = frameWidth * aspectRatio;
          canvas.height = frameHeight * maxPhotos + bottomMargin;
          currentDate = getCurrentDate();
          drawFrame();
        };
      } catch (err) {
        alert("Camera access denied.");
      }
    }

    function fitText(text, maxWidth, baseSize, minSize) {
      let fontSize = baseSize;
      do {
        ctx.font = `bold ${fontSize}px HakgyoansimNadeuriTTF-B`;
        if (ctx.measureText(text).width <= maxWidth || fontSize <= minSize) break;
        fontSize -= 1;
      } while (fontSize > minSize);
    }

    function drawFrame() {
      if (!frameHeight) return;

      ctx.fillStyle = selectedColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      for (let i = 0; i < maxPhotos; i++) {
        const x = sidePadding;
        const y = topMargin + i * frameHeight;
        const w = frameWidth - sidePadding * 2;
        const h = frameHeight - 10;
        ctx.fillRect(x, y, w, h);
        if (photos[i]) ctx.drawImage(photos[i], x, y, w, h);
      }

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      fitText(titleText, frameWidth - 24, 18, 13);
      ctx.fillText(titleText, frameWidth / 2, 40);

      ctx.font = "bold 18px HakgyoansimNadeuriTTF-B";
      ctx.fillText(currentDate, frameWidth / 2, canvas.height - 55);

      if (captionText) {
        fitText(captionText, frameWidth - 28, 17, 11);
        ctx.fillText(captionText, frameWidth / 2, canvas.height - 28);
      }
    }

    function captureCurrentVideoFrame(slotIndex) {
      if (!frameHeight || !video.videoWidth || !video.videoHeight) return;

      const dw = frameWidth - sidePadding * 2;
      const dh = frameHeight - 10;
      const photoCanvas = document.createElement("canvas");
      photoCanvas.width = dw;
      photoCanvas.height = dh;
      const photoCtx = photoCanvas.getContext("2d");

      photoCtx.save();
      photoCtx.translate(dw, 0);
      photoCtx.scale(-1, 1);
      photoCtx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 0, 0, dw, dh);
      photoCtx.restore();

      photos[slotIndex] = photoCanvas;
      drawFrame();
    }

    function updateCompleteControls() {
      const completed = photos.every(Boolean);
      captionPanel.hidden = !completed;
      retakeControls.hidden = !completed;
      if (completed && retakeIndex === null) {
        shootStatus.textContent = "네 컷 촬영 완료! 문구를 입력하거나 원하는 컷을 재촬영할 수 있습니다.";
      }
    }

    function takePhoto() {
      if (retakeIndex !== null) {
        captureCurrentVideoFrame(retakeIndex);
        shootStatus.textContent = `${retakeIndex + 1}컷 재촬영 완료!`;
        retakeIndex = null;
        updateCompleteControls();
        return;
      }

      if (photoIndex >= maxPhotos) {
        alert("All 4 photos taken.");
        return;
      }

      captureCurrentVideoFrame(photoIndex);
      photoIndex++;
      updateCompleteControls();
    }

    function prepareRetake(index) {
      if (!photos.every(Boolean)) return;
      retakeIndex = index;
      shootStatus.textContent = `${index + 1}컷을 다시 찍을 준비가 되었습니다. Take Photo를 누르면 해당 칸만 교체됩니다.`;
    }

    function downloadPhoto() {
      if (!photos.every(Boolean)) {
        alert("Please complete all 4 photos before downloading.");
        return;
      }

      drawFrame();
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = `${titleText} (${currentDate}).png`;
      link.click();
    }

    window.addEventListener("load", () => {
      colorOptions[0].classList.add("selected");
      startCamera();
      if (document.fonts) document.fonts.ready.then(drawFrame);
    });
  </script>
</body>
</html>
